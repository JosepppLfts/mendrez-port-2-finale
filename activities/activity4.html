<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 4 - User Form</title>
    <link rel="stylesheet" href="activity4.css">
</head>
<body>

    <div class="form-container">
        <div class="glitch-bar"></div>
        <h2>User Information Form</h2>
        <form action="" method="post">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="firstname" required>

            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lastname" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age">

            <div class="radio-group">
                <label>Gender:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </div>

            <div class="checkbox-group">
                <label>Hobbies:</label><br>
                <input type="checkbox" id="hobby1" name="hobby" value="Watching movies">
                <label for="hobby1">Watching Movies</label><br>
                <input type="checkbox" id="hobby2" name="hobby" value="Reading">
                <label for="hobby2">Reading</label><br>
                <input type="checkbox" id="hobby3" name="hobby" value="Playing Games">
                <label for="hobby3">Playing Games</label><br>
                <input type="checkbox" id="hobby4" name="hobby" value="Travelling">
                <label for="hobby4">Travelling</label><br>
                <input type="checkbox" id="hobby5" name="hobby" value="Driving Car">
                <label for="hobby5">Driving Car</label>
            </div>

            <label for="year-level">Year Level:</label>
            <select id="year-level" name="year_level">
                <option value="1st-year">1st Year</option>
                <option value="2nd-year">2nd Year</option>
                <option value="3rd-year">3rd Year</option>
                <option value="4th-year">4th year</option>
            </select>

            <div class="button-group">
                <button type="submit">Submit</button>
                <button type="reset">Clear</button>
            </div>
        </form>
    </div>

</body>
</html>
